stages:
  - test
  - build
  - deploy-gitops

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA 
  IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

lint-and-test:
  stage: test
  image: python:3.11-alpine
  script:
    - 'echo "Preparando ambiente de testes..."'
    - 'pip install --no-cache-dir -r requirements.txt pytest'
    - 'echo "Rodando testes unitarios com Pytest..."'
    - 'pytest test_app.py -v'
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

ai-code-review:
  stage: test
  image: python:3.11-alpine
  before_script:
    - apk add --no-cache git
    - pip install google-genai
  script:
    - echo "Extraindo alteracoes do commit atual..."
    - git diff HEAD~1 HEAD > changes.diff || echo "" > changes.diff
    - echo "Iniciando Code Review com IA..."
    - python ai_reviewer.py changes.diff
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

build-and-push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Buildando imagem $IMAGE_NAME..."
    - docker build -t $IMAGE_NAME .
    - docker push $IMAGE_NAME
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

trivy-image-scan:
  stage: build
  image: aquasec/trivy:latest
  needs: ["build-and-push"]
  script:
    - trivy image --exit-code 1 --severity CRITICAL,HIGH $IMAGE_NAME

update-gitops-repo:
  stage: deploy-gitops
  image: alpine:latest
  before_script:
    - 'apk add --no-cache git'
    - 'git config --global user.email "ci-bot@seudominio.com"'
    - 'git config --global user.name "GitLab CI Bot"'
  script:
    - 'git clone https://oauth2:${GITOPS_TOKEN}@gitlab.com/oci-project/oci-gitops.git'
    - 'cd oci-gitops'
    
    - 'echo "Atualizando tag para $IMAGE_TAG no ambiente..."'
    - 'sed -i "s/tag:.*/tag: $IMAGE_TAG/g" apps/ckad-app-values.yaml'
    
    - 'git add apps/ckad-app-values.yaml'
    - 'git commit -m "chore(deploy): update ckad-app image to $IMAGE_TAG [skip ci]"'
    - 'git push origin master'
  rules:
    - if: $CI_COMMIT_BRANCH == "master"